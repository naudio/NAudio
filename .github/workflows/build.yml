name: build

# Build & test on every PR, every push to main, and on demand. The .NET 10
# SDK is preinstalled on windows-latest, so no explicit setup-dotnet step is
# needed today — see Docs/Architecture/ReleaseStrategy.md for the trade-off
# if the runner image ever rotates and drops it.
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore
        run: dotnet restore NAudio.slnx

      - name: Build
        run: dotnet build NAudio.slnx --configuration Release --no-restore

      - name: Test
        # `dotnet test` against the slnx runs every test project. On
        # Windows that's NAudio.Core.Tests + NAudio.Windows.Tests plus
        # the SoundFile/Alsa suites (which self-skip when their native
        # deps are absent). The --solution flag is required by newer
        # .NET 10 SDK patches; positional arg form errors out.
        run: >
          dotnet test --solution NAudio.slnx
          --configuration Release
          --no-build
          --filter "TestCategory!=IntegrationTest"
          --report-trx
          --results-directory ${{ runner.temp }}/TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ${{ runner.temp }}/TestResults/*.trx
          if-no-files-found: warn
